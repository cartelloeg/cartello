<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartello – Admin</title>  
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
 <header class="website-header">
    <div class="container nav">
<a href="index.html" class="logo">Cartello</a>
<nav class="navbar" id="navbar">
     <a href="index.html">Home</a>
     <a href="shop.html">Shop</a>
     <a href="cart.html">Cart</a>
     <a href="checkout.html">Checkout</a>
     <a href="login.html">Login</a>   
     <a href="admin.html" class="active">Admin</a>
</nav>
<div class="header-tools">
<form class="search-form">
    <input class="search-input" type="search" placeholder="Search products">
    <button class="search-button" type="submit">Search</button>
</form>
<a class="cart-link" href="cart.html">🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
</a>
</div>
</div>
</header>
<main>
    <!-- Sidebar -->
<div class="sidebar">
  <h2>Admin</h2>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('products')">Products</button>
  <button onclick="showPage('orders')">Orders</button>
</div>

<!-- Content -->
<div class="content">

  <!-- Dashboard -->
  <div id="dashboard">
    <h2>Dashboard</h2>
    <div class="card"><h3 id="ordersCount">2</h3><p>Orders</p></div>
    <div class="card"><h3 id="productsCount">0</h3><p>Products</p></div>
  </div>

  <!-- Products -->
  <div id="products" class="hidden">
    <h2>Product Management</h2>

    <input type="text" id="productName" placeholder="Product Name">
    <button onclick="addProduct()">Add</button>

    <ul id="productList"></ul>
  </div>

  <!-- Orders -->
  <div id="orders" class="hidden">
    <h2>Order Management</h2>

    <div class="order">
      <p>Order #1</p>
      <p>Status: <span id="status1">Pending</span></p>
      <button onclick="updateStatus()">Mark Delivered</button>
    </div>
  </div>

</div>
</main>
<footer class="page-footer">
    <div class="footer-content">
    <div>
        <h3>Cartello</h3>
        <p>Since 2026</p>
      </div>
      <div>
        <p>Email: ziad@cartello.com</p>
        <p>Phone: +20 111 81 00000</p>
      </div>
      </div>
</footer>
<script src="script.js"></script>
</body>
</html>
